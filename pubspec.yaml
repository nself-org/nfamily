name: nfamily
description: Private family social + genealogy platform. Self-hosted Flutter app powered by nSelf.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.0
  dio: ^5.4.0
  go_router: ^13.0.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  nself_auth_sdk:
    path: ../plugins-pro/paid/auth/flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

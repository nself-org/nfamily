name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── Android ────────────────────────────────────────────────────────────────
  release-android:
    name: Release Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
      - run: flutter pub get

      - name: Decode upload keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build release AAB
        run: flutter build appbundle --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.nself.nfamily
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: internal

  # ── iOS ────────────────────────────────────────────────────────────────────
  release-ios:
    name: Release iOS IPA (TestFlight)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
      - run: flutter pub get

      - name: Build iOS
        run: flutter build ipa --release --export-options-plist ios/ExportOptions.plist
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

  # ── macOS ─────────────────────────────────────────────────────────────────
  release-macos:
    name: Release macOS DMG
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
      - run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          npm install -g create-dmg
          create-dmg \
            'build/macos/Build/Products/Release/nFamily.app' \
            'build/macos/' \
            --overwrite \
            --dmg-title 'nFamily' || true
          mv build/macos/*.dmg "nfamily-${{ github.ref_name }}-macos.dmg" || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nfamily-${{ github.ref_name }}-macos.dmg

name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Configure git authentication for private repos
        run: |
          BASIC_AUTH=$(echo -n "x-oauth-basic:${{ secrets.GITHUB_TOKEN }}" | base64)
          git config --global http."https://github.com/".extraheader "Authorization: Basic ${BASIC_AUTH}"
      - name: Get dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-warnings
      - name: Run tests
        run: flutter test

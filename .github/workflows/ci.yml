name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Configure git for private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PLUGINS_PRO_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Get dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-warnings
      - name: Run tests
        run: flutter test

name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Configure .netrc for GitHub access
        run: |
          mkdir -p ~/.ssh
          cat > ~/.netrc << EOF
          machine github.com
          login x-oauth-basic
          password ${{ secrets.GITHUB_TOKEN }}
          EOF
          chmod 600 ~/.netrc
      - name: Get dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-warnings
      - name: Run tests
        run: flutter test
